name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Check DATABASE_URL is setup
        run: echo "DATABASE_URL is set: ${{ env.DATABASE_URL != '' }}"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest
      
      - name: Make build
        run: ./scripts/buildprod.sh

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Create Docker Image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-501020/notely-ar-repo/notely:latest .
      
      - name: Run migrations
        run: |
          chmod +x ./scripts/migrateup.sh
          ./scripts/migrateup.sh

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-501020/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-501020 --max-instances=4
